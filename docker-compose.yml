services:
  camino:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - .env
    volumes:
      - ./mundo:/gonzalo/mundo
      # DF 0.47 + DFHack binarios. Saves persisten en ./df/data/save/
      - ./df:/opt/df
    working_dir: /gonzalo
    restart: unless-stopped
    # DFHack necesita setarch -R (deshabilitar ASLR) para engancharse a DF.
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    tty: true
    stdin_open: true
    depends_on:
      - ghost

  ghost:
    image: ghost:5-alpine
    restart: unless-stopped
    ports:
      - "80:2368"
    environment:
      url: ${GHOST_URL:-http://localhost}
      database__client: sqlite3
      database__connection__filename: /var/lib/ghost/content/data/ghost.db
      NODE_ENV: production
    volumes:
      - ghost_data:/var/lib/ghost/content

volumes:
  ghost_data:

