services:
  camino:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - .env
    volumes:
      - ./mundo:/gonzalo/mundo
      # DF 0.47 + DFHack binarios. Saves persisten en ./df/data/save/
      - ./df:/opt/df
    working_dir: /gonzalo
    restart: unless-stopped
    # DFHack necesita setarch -R (deshabilitar ASLR) para engancharse a DF.
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    tty: true
    stdin_open: true

